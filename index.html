<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="/fav_xbbit.png">
  <style>

      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 700;
    }

    p {
      margin: 0 0 16px;
      font-size: 18px;
    }

    a {
      color: #0969da;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Service Closure Notice</h1>

      <p>
        xbbit.io operations ended in May 2026.
      </p>

      <p>
        All user data has been deleted from our systems.
      </p>

      <p>
        If you have any questions, please contact
        <a href="mailto:contact@xbbit.io">contact@xbbit.io</a>.

</html>
